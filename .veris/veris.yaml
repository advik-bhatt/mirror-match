version: "1.0"

# MirrorMatch — real-time emotion evaluation harness for voice agents.
# Veris drives the simulation by sending scripted customer utterances to
# /api/simulate turn by turn. MirrorMatch classifies the emotion and
# returns the coaching signal for that escalation level.

actor:
  channels:
    - type: http
      url: http://localhost:3000/api/simulate
      method: POST
      headers:
        Content-Type: application/json
      request:
        message_field: message
        session_field: session_id
      response:
        type: json
        message_field: message
        session_field: session_id

agent:
  name: MirrorMatch
  code_path: /agent
  entry_point: npm start
  port: 3000
  environment:
    NODE_ENV: production
    PORT: "3000"
